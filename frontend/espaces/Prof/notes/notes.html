<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Notes étudiants - SmartCampus</title>
  <link rel="stylesheet" href="../../espaceEtudiant.css">
  <script src="notes.js"></script>
</head>

<body>

<!-- header -->
<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<!-- contenu principal -->
<main class="conteneur-professeur">

  <!-- menu lat -->
  <aside class="menu-lateral">
      <a class="element-menu" href="../espaceProfesseur.html">
        <span>▦</span>
        Tableau de bord
      </a>

      <a class="element-menu" href="../cours/cours.html">
        <span>📚</span>
        Mes cours
      </a>

      <a class="element-menu actif" href="#">
        <span>/20</span>
        Notes étudiants
      </a>

      <a class="element-menu" href="../presences/presences.html">
        <span>✅</span>
        Présences
      </a>

      <a class="element-menu" href="../eval/eval.html">
        <span>📝</span>
        Évaluations
      </a>

      <a class="element-menu" href="../message/messagerie.html">
        <span>✉</span>
        Messagerie
      </a>
    </aside>

  <!-- contenu page -->
  <section class="contenu-principal">

    <!-- formulaire pour ajout de note -->
    <section class="bloc-section">
      <h2>AJOUTER UNE NOTE</h2>

      <form id="formAjoutNote">
        <select id="etudiantId" required></select>
        <select id="coursId" required></select>
        <input type="text" id="typeEvaluation" placeholder="Évaluation" required>
        <input type="number" id="note" placeholder="Note /20" min="0" max="20" step="0.1" required>
        <input type="number" id="coefficient" placeholder="Coefficient" value="1" min="1" required>
        <button type="submit">Ajouter</button>
      </form>

      <p id="messageNote"></p>
    </section>

    <!-- tableau de notes -->
    <section class="bloc-section">
      <h2>NOTES DES ÉTUDIANTS</h2>
        <table>
          <thead>
            <tr>
              <th>Étudiant</th>
              <th>Matière</th>
              <th>Évaluation</th>
              <th>Note</th>
              <th>Coefficient</th>
              <th>Action</th>
            </tr>
          </thead>
          <!-- données dynamiques -->
          <tbody id="listeNotes"></tbody>
        </table>
    </section>
  </section>

</main>
</body>
</html>
