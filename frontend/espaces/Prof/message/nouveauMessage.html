<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Nouveau message - SmartCampus</title>
  <link rel="stylesheet" href="../../espaceEtudiant.css">
  <script src="nouveauMessage.js"></script>
</head>

<body>
<!-- header -->
<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<!-- contenu principal -->
<main class="conteneur-professeur">
  <!-- contenu lat -->
  <aside class="menu-lateral">
    <a class="element-menu" href="../espaceProfesseur.html">
      <span>▦</span>
      Tableau de bord
    </a>

    <a class="element-menu" href="../cours/cours.html">
      <span>📚</span>
      Mes cours
    </a>

    <a class="element-menu" href="../notes/notes.html">
      <span>/20</span>
      Notes étudiants
    </a>

    <a class="element-menu" href="../presences/presences.html">
      <span>✅</span>
      Présences
    </a>

    <a class="element-menu" href="../eval/eval.html">
      <span>📝</span>
      Évaluations
    </a>

    <a class="element-menu actif" href="messagerie.html">
      <span>✉</span>
      Messagerie
    </a>
  </aside>

  <!-- contenue page -->
  <section class="contenu-principal">
    <section class="bloc-section">
      <h2>NOUVEAU MESSAGE</h2>

      <!-- formulaire d'envoi -->
      <form id="formMessage">
        <!-- destinataire -->
        <label for="destinataire">
          Adresse mail destinataire
        </label>
        <input
          type="email"
          id="destinataire"
          placeholder="exemple@ifsi.fr"
          required
        >
        <label for="sujet">Sujet</label>
        <input type="text" id="sujet" required>
        <label for="contenu">Message</label>
        <textarea id="contenu" rows="8" required></textarea>
        <br>
        <button type="submit">Envoyer</button>
      </form>

      <p id="messageRetour"></p>
      <br>
      <!-- Retour messagerie -->
      <a href="messagerie.html" class="element-menu">
        Retour à la messagerie
      </a>
    </section>
  </section>

</main>
</body>
</html>
