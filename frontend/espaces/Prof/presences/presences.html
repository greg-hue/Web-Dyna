<!DOCTYPE html>
<html lang="fr">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Présences - SmartCampus</title>
  <link rel="stylesheet" href="../../espaceEtudiant.css">
  <script src="presences.js"></script>
</head>

<body>

<!-- header -->
<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<!-- contenu principal -->
<main class="conteneur-professeur">

  <!-- menu lat -->
  <aside class="menu-lateral">

    <a class="element-menu" href="../espaceProfesseur.html">
      <span>▦</span>
      Tableau de bord
    </a>

    <a class="element-menu" href="../cours/cours.html">
      <span>📚</span>
      Mes cours
    </a>

    <a class="element-menu" href="../notes/notes.html">
      <span>/20</span>
      Notes étudiants
    </a>

    <a class="element-menu actif" href="#">
      <span>✅</span>
      Présences
    </a>

    <a class="element-menu" href="../eval/eval.html">
      <span>📝</span>
      Évaluations
    </a>

    <a class="element-menu" href="../message/messagerie.html">
      <span>✉</span>
      Messagerie
    </a>

  </aside>

  <!-- contenu page -->
  <section class="contenu-principal">

    <!-- formulaire présence -->
    <section class="bloc-section">
      <h2>ENREGISTRER UNE PRÉSENCE</h2>
      <form id="formPresence">
        <select id="seanceId" required>
          <option value="">Choisir une séance</option>
        </select>

        <select id="etudiantId" required>
          <option value="">Choisir un étudiant</option>
        </select>

        <select id="statut" required>
          <option value="">Statut</option>
          <option value="present">Présent</option>
          <option value="absent">Absent</option>
          <option value="retard">Retard</option>
        </select>

        <select id="justifiee">
          <option value="0">Non justifiée</option>
          <option value="1">Justifiée</option>
        </select>

        <input type="text" id="commentaire" placeholder="Commentaire">

        <button type="submit">Enregistrer</button>
      </form>

      <p id="messagePresence"></p>

    </section>

    <!-- liste des absences -->
    <section class="bloc-section">
      <h2>ABSENCES / RETARDS ENREGISTRÉS</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Étudiant</th>
            <th>Groupe</th>
            <th>Cours</th>
            <th>Statut</th>
            <th>Justifiée</th>
            <th>Commentaire</th>
          </tr>
        </thead>

        <!-- données dynamiques -->
        <tbody id="listePresences"></tbody>
      </table>
    </section>

    <section class="bloc-section">

      <h2>GESTION DES PRÉSENCES</h2>

      <div class="bloc-formulaire">

        <div class="champ-formulaire">

          <label>📡 Sélection de la séance :</label>

          <select id="seanceId" required>
            <option value="">Choisir une séance</option>
          </select>

        </div>

        <button id="btnGenererQR" type="button" class="btn-action">
          Lancer l'appel QR
        </button>

      </div>

      <div id="qrcode" class="qrcode-centre"></div>

      <div class="bloc-ajustement">

        <h3 class="titre-ajustement">📝 Ajustement manuel</h3>

        <form id="formPresence">

          <select id="etudiantId" required>
            <option value="">Choisir un étudiant</option>
          </select>

          <select id="statut" required>
            <option value="">Statut</option>
            <option value="present">Présent</option>
            <option value="absent">Absent</option>
            <option value="retard">Retard</option>
          </select>

          <select id="justifiee">
            <option value="0">Non justifiée</option>
            <option value="1">Justifiée</option>
          </select>

          <input type="text" id="commentaire" placeholder="Commentaire">

          <button type="submit" class="btn-action">
            Enregistrer
          </button>

        </form>

      </div>

      <p id="messagePresence" class="message-presence"></p>

    </section>

  </section>

</main>
</body>
</html>
