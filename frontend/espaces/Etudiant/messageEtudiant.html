<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">

  <title>Message étudiant</title>

  <link rel="stylesheet" href="../espaceEtudiant.css">

  <script src="messageEtudiant.js"></script>

</head>

<body>

<header class="barre-haut">

  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>

</header>

<main class="conteneur-etudiant">

  <aside class="menu-lateral">

    <a class="element-menu" href="espaceEtudiant.html">
      <span>▦</span>
      Tableau de bord
    </a>

    <a class="element-menu" href="edt.html">
      <span>▣</span>
      Emploi du temps
    </a>

    <a class="element-menu" href="notes.html">
      <span>/20</span>
      Mes notes
    </a>

    <a class="element-menu actif" href="messagerieEtudiant.html">
      <span>✉</span>
      Messagerie
    </a>

    <a class="element-menu" href="notifications.html">
      <span>🔔</span>
      Notifications
    </a>

    <a class="element-menu" href="cours.html">
      <span>📚</span>
      Cours
    </a>

  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">

      <h2>MESSAGE</h2>

      <table>

        <tbody>

          <tr>
            <th>Expéditeur</th>
            <td id="expediteurMessage"></td>
          </tr>

          <tr>
            <th>Sujet</th>
            <td id="sujetMessage"></td>
          </tr>

          <tr>
            <th>Date</th>
            <td id="dateMessage"></td>
          </tr>

          <tr>
            <th>Contenu</th>
            <td id="contenuMessage"></td>
          </tr>

        </tbody>

      </table>

      <br>

      <h3>Répondre</h3>

      <form id="formReponse">

        <textarea
          id="reponseMessage"
          rows="6"
          placeholder="Votre réponse..."
          required
          style="width:100%; padding:10px;">
        </textarea>

        <br><br>

        <button type="submit">
          Envoyer la réponse
        </button>

      </form>

      <p id="messageConfirmation"></p>

      <br>

      <a href="messagerie.html"
         class="element-menu">

        Retour messagerie

      </a>

    </section>

  </section>

</main>

</body>
</html>
