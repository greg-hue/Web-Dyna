<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">

  <title>Messagerie étudiant - SmartCampus</title>

  <link rel="stylesheet" href="../espaceEtudiant.css">

  <!-- JS messagerie -->
  <script type="text/javascript" src="messagerieEtudiant.js"></script>
</head>

<body>

<header class="barre-haut">

  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>

</header>

<main class="conteneur-etudiant">

  <aside class="menu-lateral">

    <a class="element-menu" href="espaceEtudiant.html">
      <span>▦</span>
      Tableau de bord
    </a>

    <a class="element-menu" href="edt.html">
      <span>▣</span>
      Emploi du temps
    </a>

    <a class="element-menu" href="notes.html">
      <span>/20</span>
      Mes notes
    </a>

    <a class="element-menu actif" href="#">
      <span>✉</span>
      Messagerie
    </a>

    <a class="element-menu" href="notifications.html">
      <span>🔔</span>
      Notifications
    </a>

    <a class="element-menu" href="cours.html">
      <span>📚</span>
      Cours
    </a>

  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">

      <h2>MESSAGERIE</h2>

      <!-- Bouton affichage formulaire -->
      <button id="btnAfficherFormulaire">
        Nouveau message
      </button>

      <br><br>

      <!-- Formulaire envoi message -->
      <form id="formNouveauMessage" style="display:none;">

        <label for="destinataireMessage">
          Destinataire
        </label>

        <br>

        <select
          id="destinataireMessage"
          required
          style="width:100%; padding:10px;"
        >

          <option value="">
            Choisir un destinataire
          </option>

          <!-- Les utilisateurs seront ajoutés dynamiquement -->

        </select>

        <br><br>

        <label for="sujetMessage">
          Sujet
        </label>

        <br>

        <input
          type="text"
          id="sujetMessage"
          required
          placeholder="Sujet du message"
          style="width:100%; padding:10px;"
        >

        <br><br>

        <label for="contenuMessage">
          Message
        </label>

        <br>

        <textarea
          id="contenuMessage"
          rows="6"
          required
          placeholder="Votre message..."
          style="width:100%; padding:10px;"
        ></textarea>

        <br><br>

        <button type="submit">
          Envoyer
        </button>

      </form>

      <!-- Confirmation -->
      <p id="messageConfirmation"></p>

      <br>

      <!-- Tableau des messages -->
      <table>

        <thead>
          <tr>
            <th>Expéditeur</th>
            <th>Sujet</th>
            <th>Date</th>
          </tr>
        </thead>

        <tbody id="listeMessages">

          <!-- Messages ajoutés dynamiquement -->

        </tbody>

      </table>

    </section>

  </section>

</main>

</body>
</html>
