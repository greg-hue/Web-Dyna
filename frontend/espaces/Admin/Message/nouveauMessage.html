<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Espace administration - SmartCampus</title>
  <link rel="stylesheet" href="../../espaceEtudiant.css">
  <script type="text/javascript" src="nouveauMessage.js"></script>
</head>

<body>

<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<main class="conteneur-admin">

  <aside class="menu-lateral">

    <a class="element-menu" href="../espaceAdmin.html">
      <span>⚙</span>
      Administration
    </a>

    <a class="element-menu" href="../Utilisateurs/utilisateurs.html">
      <span>👥</span>
      Utilisateurs
    </a>

    <a class="element-menu" href="../Classe/adClasse.html">
      <span>🏫</span>
      Classes
    </a>

    <a class="element-menu" href="../Cours/cours.html">
      <span>📚</span>
      Cours
    </a>

    <a class="element-menu" href="../Inscriptions/inscriptions.html">
      <span>📝</span>
      Inscriptions
    </a>

    <a class="element-menu" href="../News/news.html">
      <span>📰</span>
      News
    </a>

    <a class="element-menu" href="../Stats/stat.html">
      <span>📊</span>
      Statistiques
    </a>

    <a class="element-menu" href="../Alertes/alertes.html">
      <span>🔔</span>
      Alertes
    </a>

    <a class="element-menu actif" href="#">
      <span>✉</span>
      Messagerie
    </a>
  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">
      <h2>NOUVEAU MESSAGE</h2>

      <form id="formMessage">

        <label for="destinataire">
          Adresse mail destinataire
        </label>

        <input
          type="email"
          id="destinataire"
          placeholder="exemple@ifsi.fr"
          required
        >

        <label for="sujet">Sujet</label>
        <input type="text" id="sujet" required>

        <label for="contenu">Message</label>
        <textarea id="contenu" rows="8" required></textarea>

        <br>

        <button type="submit">Envoyer</button>

      </form>

      <p id="messageRetour"></p>

      <br>

      <a href="messagerie.html" class="element-menu">
        Retour à la messagerie
      </a>

    </section>

  </section>

</main>

</body>
</html>
