<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Inscriptions - SmartCampus</title>
  <link rel="stylesheet" href="../espaceEtudiant.css">
  <script type="text/javascript" src="inscriptions.js"></script>
</head>

<body>

<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<main class="conteneur-admin">

  <aside class="menu-lateral">

    <a class="element-menu" href="espaceAdmin.html">
      <span>⚙</span>
      Administration
    </a>

    <a class="element-menu" href="utilisateurs.html">
      <span>👥</span>
      Utilisateurs
    </a>

    <a class="element-menu" href="adClasse.html">
      <span>🏫</span>
      Classes
    </a>

    <a class="element-menu" href="cours.html">
      <span>📚</span>
      Cours
    </a>

    <a class="element-menu actif" href="#">
      <span>📝</span>
      Inscriptions
    </a>

    <a class="element-menu" href="stat.html">
      <span>📊</span>
      Statistiques
    </a>

    <a class="element-menu" href="alertes.html">
      <span>🔔</span>
      Alertes
    </a>

    <a class="element-menu actif" href="messagerie.html">
      <span>✉</span>
      Messagerie
    </a>

  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">

      <h2>AJOUTER UNE INSCRIPTION</h2>

      <form id="formAjoutInscription">

        <select id="etudiantId" required>
          <option value="">Choisir un étudiant</option>
        </select>

        <select id="coursId" required>
          <option value="">Choisir un cours</option>
        </select>

        <button type="submit">Inscrire</button>

      </form>

      <p id="messageInscription"></p>

    </section>

    <section class="bloc-section">

      <h2>INSCRIPTIONS</h2>

      <table>
        <thead>
          <tr>
            <th>Étudiant</th>
            <th>Groupe</th>
            <th>Cours</th>
            <th>Date</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="listeInscriptions">
        </tbody>
      </table>

    </section>

  </section>

</main>

</body>
</html>
