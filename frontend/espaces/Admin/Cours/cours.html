<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Cours - SmartCampus</title>
  <link rel="stylesheet" href="../../espaceEtudiant.css">
  <script type="text/javascript" src="cours.js"></script>
</head>

<body>

<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<main class="conteneur-admin">

  <aside class="menu-lateral">

    <a class="element-menu" href="../espaceAdmin.html">
      <span>⚙</span>
      Administration
    </a>

    <a class="element-menu" href="../Utilisateurs/utilisateurs.html">
      <span>👥</span>
      Utilisateurs
    </a>

    <a class="element-menu" href="../Classe/adClasse.html">
      <span>🏫</span>
      Classes
    </a>

    <a class="element-menu actif" href="#">
      <span>📚</span>
      Cours
    </a>

    <a class="element-menu" href="../Inscriptions/inscriptions.html">
      <span>📝</span>
      Inscriptions
    </a>

    <a class="element-menu" href="../News/news.html">
      <span>📰</span>
      News
    </a>

    <a class="element-menu" href="../Stats/stat.html">
      <span>📊</span>
      Statistiques
    </a>

    <a class="element-menu" href="../Alertes/alertes.html">
      <span>🔔</span>
      Alertes
    </a>

    <a class="element-menu" href="../Message/messagerie.html">
      <span>✉</span>
      Messagerie
    </a>

  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">

      <h2>AJOUTER UN COURS</h2>

      <form id="formAjoutCours">

        <input type="text" id="titre" placeholder="Titre du cours" required>
        <input type="text" id="code" placeholder="Code" required>
        <input type="text" id="description" placeholder="Description">

        <input type="number" id="credits" placeholder="Crédits" required>
        <input type="number" id="semestre" placeholder="Semestre" required>
        <input type="number" id="niveau" placeholder="Niveau" required>
        <input type="number" id="capaciteMax" placeholder="Capacité max" required>

        <select id="enseignantId" required>
          <option value="">Choisir un enseignant</option>
        </select>

        <button type="submit">Ajouter</button>

      </form>

      <p id="messageCours"></p>

    </section>

    <section class="bloc-section">

      <h2>LISTE DES COURS</h2>

      <table>
        <thead>
          <tr>
            <th>Titre</th>
            <th>Code</th>
            <th>Crédits</th>
            <th>Semestre</th>
            <th>Niveau</th>
            <th>Capacité</th>
            <th>Enseignant</th>
          </tr>
        </thead>

        <tbody id="listeCours">
        </tbody>
      </table>

    </section>

  </section>

</main>

</body>
</html>
