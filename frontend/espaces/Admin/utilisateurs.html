<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Utilisateurs - SmartCampus</title>
  <link rel="stylesheet" href="../espaceEtudiant.css">
  <script type="text/javascript" src="utilisateurs.js"></script>
</head>

<body>

<header class="barre-haut">
  <div class="bloc-logo">
    <div class="logo">✚</div>
    <h1>IFSI Florence Nightingale</h1>
  </div>

  <div class="bloc-utilisateur">
    <span id="nomUtilisateur"></span>
    <span class="statut" id="roleUtilisateur"></span>
    <span class="deconnexion" id="btnDeconnexion">↪</span>
  </div>
</header>

<main class="conteneur-admin">

  <aside class="menu-lateral">

    <a class="element-menu" href="espaceAdmin.html">
      <span>⚙</span>
      Administration
    </a>

    <a class="element-menu actif" href="#">
      <span>👥</span>
      Utilisateurs
    </a>

    <a class="element-menu" href="adClasse.html">
      <span>🏫</span>
      Classes
    </a>

    <a class="element-menu" href="cours.html">
      <span>📚</span>
      Cours
    </a>

    <a class="element-menu" href="inscriptions.html">
      <span>📝</span>
      Inscriptions
    </a>

    <a class="element-menu" href="stat.html">
      <span>📊</span>
      Statistiques
    </a>

    <a class="element-menu" href="alertes.html">
      <span>🔔</span>
      Alertes
    </a>

    <a class="element-menu" href="messagerie.html">
      <span>✉</span>
      Messagerie
    </a>

  </aside>

  <section class="contenu-principal">

    <section class="bloc-section">

      <h2>AJOUTER UN UTILISATEUR</h2>

      <form id="formAjoutUtilisateur">

        <input type="text" id="prenom" placeholder="Prénom" required>
        <input type="text" id="nom" placeholder="Nom" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="motDePasse" placeholder="Mot de passe" required>

        <select id="role" required>
          <option value="">Choisir un rôle</option>
          <option value="etudiant">Étudiant</option>
          <option value="enseignant">Enseignant</option>
          <option value="admin">Administrateur</option>
        </select>

        <button type="submit">
          Ajouter
        </button>

      </form>

      <p id="messageUtilisateur"></p>

    </section>

    <section class="bloc-section">

      <h2>UTILISATEURS</h2>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Date création</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="listeUtilisateurs">
        </tbody>
      </table>

    </section>

  </section>

</main>

</body>
</html>
